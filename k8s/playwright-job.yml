apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-job-{{SHARD_ID}}
spec:
  template:
    spec:
      containers:
        - name: playwright
          image: $DOCKERHUB_USERNAME/playwright-k8:latest
          workingDir: /app
          command: ["bash", "-c", "npx playwright test --shard={{SHARD_ID}}/{{TOTAL_SHARDS}}"]
      restartPolicy: Never
  backoffLimit: 0
