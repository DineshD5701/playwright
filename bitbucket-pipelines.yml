image: atlassian/default-image:4

pipelines:
  default:
    - step:
        name: Build & Deploy to Minikube
        services:
          - docker
        script:
          # 1️⃣ Setup kubectl
          - apt-get update && apt-get install -y kubectl

          # 2️⃣ Restore kubeconfig from Bitbucket variable
          - mkdir -p ~/.kube
          - echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config

          # 3️⃣ Docker login to push image
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # 4️⃣ Build & push the Playwright image
          - IMAGE_NAME=dinesh571/playwright-k8:latest
          - docker build -t $IMAGE_NAME .
          - docker push $IMAGE_NAME

          # 5️⃣ Deploy to Minikube
          - kubectl create deployment playwright-deployment --image=$IMAGE_NAME --dry-run=client -o yaml | kubectl apply -f -
          - kubectl set image deployment/playwright-deployment playwright=$IMAGE_NAME

          # 6️⃣ Expose service
          - kubectl expose deployment playwright-deployment --type=NodePort --port=80 --name=playwright-service --dry-run=client -o yaml | kubectl apply -f -

          # 7️⃣ Start ngrok to expose service
          - curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          - echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | tee /etc/apt/sources.list.d/ngrok.list
          - apt-get update && apt-get install -y ngrok

          # Authenticate ngrok
          - ngrok config add-authtoken $NGROK_AUTH_TOKEN

          # Get NodePort for the service
          - NODE_PORT=$(kubectl get service playwright-service -o=jsonpath='{.spec.ports[0].nodePort}')

          # Start ngrok in background
          - ngrok http --log=stdout $NODE_PORT > ngrok.log &
          - sleep 5

          # Print public URL
          - curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'

definitions:
  services:
    docker:
      memory: 2048
