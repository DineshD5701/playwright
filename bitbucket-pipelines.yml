image: ubuntu:22.04

options:
  docker: true

pipelines:
  default:
    - step:
        name: Deploy Playwright to Minikube
        services:
          - docker
        script:
          # Install dependencies
          - apt-get update && apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release

          # Install Docker CLI
          - curl -fsSL https://get.docker.com | sh

          # Install kubectl
          - curl -fsSLo /usr/share/keyrings/kubernetes-archive-keyring.gpg https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
          - echo "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /" \
            | tee /etc/apt/sources.list.d/kubernetes.list
          - apt-get update && apt-get install -y kubectl

          # Docker login
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Build & push image
          - docker build -t $DOCKERHUB_USERNAME/playwright-tests:latest .
          - docker push $DOCKERHUB_USERNAME/playwright-tests:latest

          # Replace image placeholder
          - sed -i "s|<IMAGE_PLACEHOLDER>|$DOCKERHUB_USERNAME/playwright-tests:latest|g" k8s/deployment.yml

          # Set up kubeconfig
          - echo "$KUBECONFIG_CONTENT" | base64 -d > kubeconfig
          - export KUBECONFIG=$(pwd)/kubeconfig

          # Deploy
          - kubectl apply -f k8s/deployment.yml

          # Wait for pods
          - kubectl rollout status deployment/playwright-app --timeout=120s

          # Debug info
          - kubectl get svc
          - kubectl get pods -o wide
          - kubectl logs -l app=ngrok --tail=50 || echo "ngrok logs not found"

definitions:
  services:
    docker:
      memory: 1024
