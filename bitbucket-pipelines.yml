image: docker:24.0.6

options:
  docker: true

pipelines:
  default:
    - step:
        name: Build, Push & Deploy to Local Minikube via ngrok
        services:
          - docker
        script:
          # Install kubectl
          - apk add --no-cache curl bash
          - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          # Docker login
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Build & push your Docker image
          - DOCKER_BUILDKIT=0 docker build -t $DOCKERHUB_USERNAME/playwright-k8:latest .
          - docker push $DOCKERHUB_USERNAME/playwright-k8:latest

          # Setup kubeconfig from ngrok tunnel
          - echo "$KUBECONFIG_CONTENT" | base64 -d > kubeconfig
          - export KUBECONFIG=$(pwd)/kubeconfig

          # Confirm k8s folder contents
          - ls -l k8s/

          # Deploy using kubectl via ngrok tunnel
          - kubectl apply -f k8s/deployment.yml

          # Wait for rollout to finish
          - kubectl rollout status deployment/playwright-app --timeout=180s

          # Optional: Get service and pod info
          - kubectl get svc
          - kubectl get pods -o wide
