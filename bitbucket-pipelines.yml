image: ubuntu:22.04

options:
  docker: true

pipelines:
  default:
    - step:
        name: Deploy Playwright to Minikube
        services:
          - docker
        script:
          # --- Install kubectl ---
          - apt-get update && apt-get install -y apt-transport-https ca-certificates curl gnupg
          - curl -fsSLo /usr/share/keyrings/kubernetes-archive-keyring.gpg https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
          - echo "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /" | tee /etc/apt/sources.list.d/kubernetes.list
          - apt-get update && apt-get install -y kubectl

          # --- Docker login ---
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # --- Build & push Docker image ---
          - docker build -t $DOCKERHUB_USERNAME/playwright-tests:latest .
          - docker push $DOCKERHUB_USERNAME/playwright-tests:latest

          # --- Configure kubectl ---
          - echo "$KUBECONFIG_CONTENT" | base64 -d > kubeconfig
          - export KUBECONFIG=$(pwd)/kubeconfig

          # --- Deploy both Deployment & Service from single file ---
          - kubectl apply -f deployment.yml

          # --- Wait for deployment rollout ---
          - kubectl rollout status deployment/playwright-app --timeout=180s

          # --- Show debug info ---
          - kubectl get svc
          - kubectl get pods -o wide
          - kubectl logs -l app=ngrok --tail=50 || echo "No ngrok logs yet"

definitions:
  services:
    docker:
      memory: 2048
