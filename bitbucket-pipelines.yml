image: docker:24.0.6

options:
  docker: true

pipelines:
  default:
    - step:
        name: Build, Push & Run Playwright Jobs on Minikube via ngrok
        services:
          - docker
        script:
          # Install kubectl
          - apk add --no-cache curl bash
          - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          # Docker login
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Build & push Docker image
          - DOCKER_BUILDKIT=0 docker build -t $DOCKERHUB_USERNAME/playwright-k8:latest .
          - docker push $DOCKERHUB_USERNAME/playwright-k8:latest

          # Setup kubeconfig from ngrok tunnel
          - echo "$KUBECONFIG_CONTENT" | base64 -d > kubeconfig
          - export KUBECONFIG=$(pwd)/kubeconfig

          # Deploy 4 Playwright Jobs for parallel shards
          - |
            for i in 1 2 3 4; do
              sed "s/{{SHARD_ID}}/$i/g; s/{{TOTAL_SHARDS}}/4/g" k8s/playwright-job.yaml | kubectl apply -f -
            done

          # Wait for all jobs to complete (polling)
          - |
            echo "Waiting for Playwright jobs to complete..."
            for i in 1 2 3 4; do
              kubectl wait --for=condition=complete --timeout=600s job/playwright-test-$i
            done

          # Optional: show job pod logs for debugging
          - |
            for i in 1 2 3 4; do
              pod=$(kubectl get pods -l job-name=playwright-test-$i -o jsonpath='{.items[0].metadata.name}')
              echo "Logs for pod $pod:"
              kubectl logs $pod || true
            done
